# Fly.io config — agent worker (background job poller, no HTTP service).
# Deploy from the worker/ directory so the Docker build context is correct:
#   cd worker && flyctl deploy
# Secrets (SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, ANTHROPIC_API_KEY, ...)
# are set via `flyctl secrets set` — see DEPLOY.md.

app = "super-bmc-worker"
primary_region = "iad"

kill_signal = "SIGINT"
kill_timeout = "30s"

# Restart forever: the default on-failure policy gives up after repeated
# crashes and leaves machines STOPPED (live incident 2026-07-07 — the queue
# then starves silently). A background poller must always come back.
[[restart]]
  policy = "always"

[build]
  dockerfile = "Dockerfile"

[[vm]]
  size = "shared-cpu-1x"
  # 1GB: the Claude Agent SDK spawns a Node CLI child per model call; at
  # 512MB the spawn is the prime suspect for the live "exited with code 1"
  # failures (2026-07-06 incident, see BUILD_STATE).
  memory = "1024mb"
