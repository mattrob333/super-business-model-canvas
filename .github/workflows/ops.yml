name: Ops

# Manual operations — run from the Actions tab, pick a task.
# All keys live in GitHub repo secrets; nothing is printed to logs.

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Which operation to run"
        type: choice
        required: true
        options:
          - sync-secrets
          - deploy-edge-functions
          - apply-migrations
          - live-golden-set
          - worker-diagnose

env:
  SUPABASE_PROJECT_REF: mehhuxzamnpxnkbrslls

jobs:
  sync-secrets:
    name: Push API keys to Fly worker + Supabase edge functions
    if: inputs.task == 'sync-secrets'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Set Fly worker secrets (only non-empty keys)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          GOOGLE_TRENDS_API_KEY: ${{ secrets.GOOGLE_TRENDS_API_KEY }}
          GH_FEED_TOKEN: ${{ secrets.GH_FEED_TOKEN }}
          SEC_EDGAR_USER_AGENT: ${{ secrets.SEC_EDGAR_USER_AGENT }}
        run: |
          args=()
          add() { if [ -n "$2" ]; then args+=("$1=$2"); fi; }
          add SUPABASE_URL "$SUPABASE_URL"
          add SUPABASE_SERVICE_ROLE_KEY "$SUPABASE_SERVICE_ROLE_KEY"
          add ANTHROPIC_API_KEY "$ANTHROPIC_API_KEY"
          add OPENROUTER_API_KEY "$OPENROUTER_API_KEY"
          add XAI_API_KEY "$XAI_API_KEY"
          add EXA_API_KEY "$EXA_API_KEY"
          add FIRECRAWL_API_KEY "$FIRECRAWL_API_KEY"
          add FRED_API_KEY "$FRED_API_KEY"
          add GOOGLE_TRENDS_API_KEY "$GOOGLE_TRENDS_API_KEY"
          add GITHUB_TOKEN "$GH_FEED_TOKEN"
          add SEC_EDGAR_USER_AGENT "$SEC_EDGAR_USER_AGENT"
          if [ ${#args[@]} -eq 0 ]; then echo "No secrets configured yet"; exit 1; fi
          flyctl secrets set --app super-bmc-worker "${args[@]}"

      - name: Set Supabase edge function secrets (only non-empty keys)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          CREDENTIALS_ENCRYPTION_KEY: ${{ secrets.CREDENTIALS_ENCRYPTION_KEY }}
        run: |
          args=()
          add() { if [ -n "$2" ]; then args+=("$1=$2"); fi; }
          add ANTHROPIC_API_KEY "$ANTHROPIC_API_KEY"
          add OPENROUTER_API_KEY "$OPENROUTER_API_KEY"
          add XAI_API_KEY "$XAI_API_KEY"
          add FIRECRAWL_API_KEY "$FIRECRAWL_API_KEY"
          add CREDENTIALS_ENCRYPTION_KEY "$CREDENTIALS_ENCRYPTION_KEY"
          if [ ${#args[@]} -eq 0 ]; then echo "No secrets configured yet"; exit 1; fi
          supabase secrets set --project-ref "$SUPABASE_PROJECT_REF" "${args[@]}"

  deploy-edge-functions:
    name: Deploy all Supabase edge functions
    if: inputs.task == 'deploy-edge-functions'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy --project-ref "$SUPABASE_PROJECT_REF"

  apply-migrations:
    name: Apply pending DB migrations to the live project
    if: inputs.task == 'apply-migrations'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link project and push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          supabase link --project-ref "$SUPABASE_PROJECT_REF"

          push() { supabase db push --include-all 2>&1 | tee /tmp/push.log; }

          if push; then
            exit 0
          fi

          # Reconciliation: migrations before this CLI path existed were
          # applied manually (MCP/CLI sessions), leaving history rows whose
          # timestamps do not match the repo filenames — the CLI refuses to
          # push until the ledgers agree. Mark the remote-only history rows
          # reverted (bookkeeping only; the schema objects stay), record repo
          # files older than the cutoff as applied WITHOUT re-running them
          # (the live schema already contains them), then push what is
          # genuinely pending. Files >= the cutoff follow the idempotent
          # convention (BUILD_PLAN rules 11/12) and are safe to (re)run.
          if ! grep -q "Remote migration versions not found" /tmp/push.log; then
            exit 1
          fi

          revs=$(grep -oE 'repair --status reverted [0-9 ]+' /tmp/push.log | head -1 | sed 's/.*reverted //' | xargs || true)
          if [ -n "$revs" ]; then
            # shellcheck disable=SC2086 # versions are a space-separated list
            supabase migration repair --status reverted $revs
          fi

          CUTOFF=20260705000000  # everything below is confirmed applied live (BUILD_STATE)
          for f in supabase/migrations/*.sql; do
            v=$(basename "$f" | cut -d_ -f1)
            if [ "$v" -lt "$CUTOFF" ]; then
              # || true: already-recorded versions are the safe case
              supabase migration repair --status applied "$v" || true
            fi
          done

          push

  live-golden-set:
    name: Run the live verifier golden set (must score >= 9/10)
    if: inputs.task == 'live-golden-set'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run golden set against the live model
        working-directory: worker
        env:
          GOLDEN_LIVE: "1"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          npm ci
          npx vitest run verifier-golden

  worker-diagnose:
    name: Worker diagnostics (status, secret names, recent logs)
    if: inputs.task == 'worker-diagnose'
    runs-on: ubuntu-latest
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Machine status + memory
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl status -a super-bmc-worker
          flyctl machine list -a super-bmc-worker
      - name: Secret NAMES on the worker (values are never printed)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl secrets list -a super-bmc-worker
      - name: Recent worker logs
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          # fly logs streams; --no-tail returns the recent buffer and exits.
          # timeout guards against CLI versions that keep the stream open.
          timeout 45 flyctl logs -a super-bmc-worker --no-tail || true
