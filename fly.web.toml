# Fly.io config — frontend (superbmc.com)
# Deployed by .github/workflows/deploy.yml on every push to main.

app = "super-bmc-web"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.web"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
